name: Build APK

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip zip unzip openjdk-17-jdk libffi-dev libssl-dev zlib1g-dev
          pip install buildozer cython

      - name: Init buildozer
        run: buildozer init

      - name: Configure
        run: |
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,requests/' buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
